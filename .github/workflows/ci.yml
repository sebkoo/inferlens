name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Skeleton (rung 00). The real build/test/lint steps land at rung 26; steps below are
# intentionally inert placeholders so the workflow shape is reviewable now.
jobs:
  build-test:
    name: build + test
    runs-on: macos-15   # TODO(rung 26): pin a runner image that ships Xcode 26 / Swift 6.3
    steps:
      - uses: actions/checkout@v4

      - name: Select toolchain
        run: echo "TODO(rung 26): sudo xcode-select -s /Applications/Xcode_26.app  # Swift 6.3"

      - name: Bootstrap (fetch checksum-pinned models; resolve LiteRT xcframework)
        run: make bootstrap

      - name: Lint
        run: make lint

      - name: Build + test
        run: make test

  commit-hygiene:
    name: no AI attribution trailers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject AI attribution trailers in the commit range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            before="${{ github.event.before }}"
            case "$before" in
              ""|0000000000000000000000000000000000000000)
                range="$(git rev-list --max-parents=0 HEAD | tail -n1)..${{ github.sha }}" ;;
              *) range="$before..${{ github.sha }}" ;;
            esac
          fi
          echo "Checking commit messages in $range"
          if git log --format='%H%n%B' "$range" | grep -Ei 'co-authored-by.*claude|generated with|🤖'; then
            echo "FAIL: AI attribution trailer found in the commit range." >&2
            exit 1
          fi
          echo "ok: no AI attribution trailers"
