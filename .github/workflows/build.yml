name: build + test

# The iOS build+test gate — rung 31. It runs the local green bar, `bash scripts/test-clean.sh`, on a
# hosted runner: same 0/1/2 exit contract, same fresh -derivedDataPath isolation.
#
# WHY macos-26 AND WHY A NAMED SIM DEVIATION. Package.swift declares swift-tools-version 6.3, and — found
# empirically on this rung's first two CI runs, the runner being the judge — no GA runner Xcode provides
# Swift 6.3: macos-15 tops out at Xcode 26.3 / Swift 6.2.3, which cannot even resolve the package graph.
# Swift 6.3 first ships in Xcode 26.6, which is present ONLY on the macos-26 image (the same Xcode 26.6 /
# Swift 6.3.3, build 17F113, the maintainer builds with locally — so "green in CI" means the same compiler
# as "green locally", the axis the failure was actually on). But macos-26 carries no iOS 26.1 runtime —
# the counted suite's pin. No single runner has BOTH the Swift 6.3 toolchain and the iOS 26.1 sim.
#
# The toolchain is non-negotiable (without Swift 6.3 nothing compiles); the sim's OS version is not, because
# CI runs correctness tests, not published latency numbers (the bench is device-only, a later rung). So CI
# takes the exact-toolchain runner and runs the iPhone 17 Pro on the NEWEST iOS runtime this image provides,
# and NAMES that deviation — in the resolve step below, in the job name, and in the README, which keeps CI's
# pair distinct from the counted suite's iPhone 17 Pro / iOS 26.1. test-clean gains one documented, defaulted
# env seam (INFERLENS_SIM_OS) for exactly this; unset, its behavior is unchanged.
#
# WHAT THIS RUNG DELIBERATELY DOES NOT RUN: `make lint` / `make test` — stubs that echo a TODO and exit 0,
# so running them here would be an empty target readable as a pass. Wiring swiftformat/swiftlint and a
# contract-preserving `make test` is the separate "wire swiftformat/swiftlint" Harness-backlog item.

on:
  push:
    branches: [main]

# macOS minutes are billed 10x, so a superseded run is wasted spend: cancel an in-flight run when a newer
# push to the same ref lands. One workflow, no matrix.
concurrency:
  group: build-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: "build + test (iPhone 17 Pro, newest CI iOS sim)"
    runs-on: macos-26   # the only image carrying Xcode 26.6 / Swift 6.3.3 — matches the local toolchain
    steps:
      - uses: actions/checkout@v4

      # Select Xcode 26.6 (Swift 6.3.3), the exact toolchain the maintainer builds with and the lowest that
      # satisfies Package.swift's swift-tools-version 6.3. The runner default is older. Assert the Swift
      # version and fail loud if the image ever moves 26.6, rather than resolve into a wrong toolchain.
      - name: Select Xcode 26.6 (Swift 6.3.3 — matches the local toolchain)
        run: |
          sudo xcode-select -s /Applications/Xcode_26.6.app
          xcodebuild -version
          swift --version
          sw="$(swift --version 2>&1 | grep -oE 'Swift version [0-9]+\.[0-9]+' | grep -oE '[0-9]+\.[0-9]+' | head -1)"
          maj="${sw%%.*}"; min="${sw#*.}"
          if [ "${maj:-0}" -lt 6 ] || { [ "$maj" -eq 6 ] && [ "${min:-0}" -lt 3 ]; }; then
            echo "FAIL: selected Xcode reports Swift '${sw:-none}' (< 6.3); Package.swift needs tools 6.3" >&2
            exit 1
          fi
          echo "ok: Swift $sw (>= 6.3)"

      # The counted suite's pin is iPhone 17 Pro / iOS 26.1, but this image carries no iOS 26.1 runtime. Run
      # the iPhone 17 Pro on the NEWEST iOS runtime it DOES carry, resolved from the runner (never guessed),
      # and hand it to test-clean through its documented env seam. This IS the named deviation: CI's pair is
      # iPhone 17 Pro / iOS <resolved>, printed here and carried in every row, distinct from iOS 26.1. Fail
      # loud if the image has no iPhone 17 Pro on any iOS runtime at all.
      - name: Resolve the CI simulator (named OS deviation — no iOS 26.1 on the Swift-6.3 runner)
        run: |
          os="$(xcrun simctl list -j devices available | python3 -c '
          import json, sys
          devs = json.load(sys.stdin)["devices"]
          best = None
          for rt, items in devs.items():
              if "com.apple.CoreSimulator.SimRuntime.iOS-" not in rt:
                  continue
              if not any(i["name"] == "iPhone 17 Pro" and i.get("isAvailable", True) for i in items):
                  continue
              ver = rt.split("iOS-")[-1].replace("-", ".")
              key = [int(p) for p in ver.split(".")]
              if best is None or key > best[0]:
                  best = (key, ver)
          print(best[1] if best else "")
          ')"
          if [ -z "$os" ]; then
            echo "FAIL: no available iPhone 17 Pro on any iOS runtime of this image" >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          echo "CI simulator: iPhone 17 Pro / iOS $os  (counted-suite pin is iOS 26.1; the deviation is named)"
          echo "INFERLENS_SIM_NAME=iPhone 17 Pro" >> "$GITHUB_ENV"
          echo "INFERLENS_SIM_OS=$os" >> "$GITHUB_ENV"

      # Cache the checksum-pinned inputs, keyed on the pins THEMSELVES so a pin change busts the cache by
      # construction — it can never mask a fetch regression. Restored: the fetched + derived model bytes and
      # SwiftPM's shared download cache (the LiteRT xcframework binaryTarget, checksum-pinned in
      # Package.swift). Both are OS-independent inputs. NOT the per-run DerivedData — test-clean rebuilds
      # that fresh every run on purpose (its header: the shared swiftpm cache is a "shared but sound INPUT").
      - name: Cache pinned deps (models + SwiftPM/LiteRT)
        uses: actions/cache@v4
        with:
          path: |
            Vendor/Models
            Vendor/Fixtures
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-inferlens-deps-${{ hashFiles('scripts/fetch-models.sh', 'Package.swift') }}

      # Fetches the checksum-pinned models and wires the git hooks. Fails CLOSED on any pin mismatch
      # (fetch-models.sh exits 1), which reds the job. A bare build has no engine (invariant 8), so bootstrap
      # precedes the suite.
      - name: Bootstrap (fetch checksum-pinned models)
        run: make bootstrap

      # Run the SAME script that is the local green bar, verbatim — it reads INFERLENS_SIM_* from the resolve
      # step above. TMPDIR is pointed at a known workspace dir only so the failure artifact below has a stable
      # path; test-clean already honors ${TMPDIR:-/tmp} for its fresh -derivedDataPath. The script's 0/1/2
      # exit maps straight onto this step's pass/fail.
      - name: Build + test (fresh -derivedDataPath, resolved sim)
        run: |
          mkdir -p "$GITHUB_WORKSPACE/ci-derived"
          export TMPDIR="$GITHUB_WORKSPACE/ci-derived"
          # This runner is shared, virtualized hardware where a single-run compute ratio is weather, not
          # evidence — a Core ML first-inference cost measured 10.3× run 2 here (rung 31 finding). xcodebuild
          # forwards TEST_RUNNER_* to the test process (stripped), so the per-engine …SteadyStateTiming tests
          # see INFERLENS_CI_SHARED_HW and XCTSkip the timing gate, logging the ratio. The 4× threshold is
          # untouched; local/device runs (which do not set this) still gate fully.
          export TEST_RUNNER_INFERLENS_CI_SHARED_HW=1
          bash scripts/test-clean.sh

      # On red — a test failure (exit 1) OR a could-not-run (exit 2) — keep the full xcodebuild log and the
      # result bundle test-clean wrote inside its fresh DerivedData, so the failure is diagnosable from the
      # run page without a re-run. Nothing is uploaded on green.
      - name: Upload xcodebuild log + result bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: |
            ${{ github.workspace }}/ci-derived/inferlens-derived.*/xcodebuild.log
            ${{ github.workspace }}/ci-derived/inferlens-derived.*/tests.xcresult
          if-no-files-found: warn
          retention-days: 14
