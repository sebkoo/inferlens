# SwiftLint configuration — Inferlens
# Invariants live in CLAUDE.md. Where a rule can encode one it does; the rest are enforced
# by review and by CI grep-lint (the at-most-one @unchecked Sendable check lands at rung 16).

disabled_rules:
  - todo            # TODO stubs are expected in the early ladder

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - sorted_first_last
  - unused_import

line_length:
  warning: 100
  error: 120

file_length:
  warning: 400

identifier_name:
  min_length: 2

excluded:
  - .build
  - Vendor

custom_rules:
  unchecked_sendable_reminder:
    name: "At-most-one @unchecked Sendable boundary"
    regex: "@unchecked Sendable"
    message: "At most one @unchecked Sendable — the LiteRT C-handle boundary, only if a design requires it (the on-actor engine ships zero; ADR-0005). Precise at-most-one enforcement is the CI grep-lint at rung 16."
    severity: warning
